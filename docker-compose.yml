services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-bot
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce_bot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce_bot_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:alpine
    container_name: redis-bot
    ports:
      - "6379:6379"
    restart: always

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-bot
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always

  api:
    build: .
    container_name: ecommerce-bot-api
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_URI=postgresql+asyncpg://postgres:postgres@postgres:5432/ecommerce_bot_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    restart: always

volumes:
  postgres-data:
